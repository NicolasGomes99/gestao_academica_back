spring:
  application:
    name: sgu-auth-service
  profiles:
    active: docker

  config:
    import: "configserver:"

  cloud:
    config:
      uri: http://config-service:8888
      fail-fast: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6380}